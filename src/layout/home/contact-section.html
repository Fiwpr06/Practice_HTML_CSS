<section class="contact-section">
  <header class="contact-header">
    <h2 class="contact-title">
      Let's Connect with us!<br />
      Discuss for grow ...
    </h2>
    <p class="contact-subtitle">
      Thank you for getting in touch!<br />
      Kindly. Fill the form, have a great day!
    </p>
  </header>

  <div class="watermark-text">YourTrans</div>

  <form class="contact-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <label class="form-label">Your Email</label>
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <label class="form-label">Country</label>
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Company Name</label>
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <div class="dropdown-container">
          <label class="form-label dropdown-label">Interested in</label>
          <img
            src="../assets/icon/Vector 54.svg"
            class="dropdown-arrow"
            alt="Dropdown arrow"
          />
        </div>
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-group message-group">
      <label class="form-label">Message</label>
      <hr class="input-line" />
    </div>
  </form>

  <h2 class="contact-watermark">CONTACT <span>U</span>S</h2>
</section>
