<section class="contact-section">
  <div class="contact-bound">
    <header class="contact-header">
      <h2 class="contact-title">
        Let's Connect with us!<br />
        Discuss for grow ...
      </h2>
      <p class="contact-subtitle">
        Thank you for getting in touch!<br />
        Kindly. Fill the form, have a great day!
      </p>
    </header>

    <div class="watermark">
      <div class="watermark-text">YourTrans</div>
      <div class="watermark-contact">CONTACT <span>U</span>S</div>
    </div>

    <include
      src="./components/contact-form.html"
      locals='{
        "formRows": [
          [
            { "type": "text", "placeholder": "Your Name" },
            { "type": "email", "placeholder": "Your Email" }
          ],
          [
            { "type": "tel", "placeholder": "Phone Number" },
            { "type": "text", "placeholder": "Country" }
          ],
          [
            { "type": "text", "placeholder": "Company Name" },
            {
              "type": "text",
              "placeholder": "Interested in",
              "dropdown": true,
              "icon": "../assets/icon/Vector 54.svg"
            }
          ]
        ]
      }'
    ></include>
  </div>
</section>
