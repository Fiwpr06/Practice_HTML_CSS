<section class="contact-section">
  <header class="contact-header">
    <h2 class="contact-title">
      Let's Connect with us!<br />
      Discuss for grow ...
    </h2>
    <p class="contact-subtitle">
      Thank you for getting in touch!<br />
      Kindly. Fill the form, have a great day!
    </p>
  </header>

  <div class="watermark-text">YourTrans</div>

  <form class="contact-form">
    <div class="form-row">
      <div class="form-group">
        <input type="text" class="form-input" placeholder="Your Name" />
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <input type="email" class="form-input" placeholder="Your Email" />
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <input type="tel" class="form-input" placeholder="Phone Number" />
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <input type="text" class="form-input" placeholder="Country" />
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <input type="text" class="form-input" placeholder="Company Name" />
        <hr class="input-line" />
      </div>
      <div class="form-group">
        <div class="dropdown-container">
          <select class="form-input dropdown-label">
            <option value="" disabled selected>Interested in</option>
          </select>
          <img
            src="../assets/icon/Vector 54.svg"
            class="dropdown-arrow"
            alt="Dropdown arrow"
          />
        </div>
        <hr class="input-line" />
      </div>
    </div>

    <div class="form-group message-group">
      <input class="form-input" type="text" placeholder="Message" />
      <hr class="input-line" />
    </div>
  </form>

  <div class="contact-watermark">CONTACT <span>U</span>S</div>
</section>
